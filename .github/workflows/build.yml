name: Build IPA / DEB

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: 🔨 Theos Build
    runs-on: ubuntu-latest

    env:
      THEOS: /home/runner/theos
      THEOS_MAKE_PATH: /home/runner/theos/makefiles

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. Cache Theos + SDKs ─────────────────────────────────────────
      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: /home/runner/theos
          key: theos-linux-v4

      # ── 3. Install system dependencies ───────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git curl wget unzip zip \
            make clang llvm \
            libssl-dev libz-dev \
            fakeroot dpkg

      # ── 4. Clone Theos directly (skip install-theos script) ──────────
      - name: Clone Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          mkdir -p $THEOS/sdks

      # ── 5. Download iOS 14.5 SDK ──────────────────────────────────────
      - name: Download iOS 14.5 SDK
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          curl -fL "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz" \
               -o /tmp/iPhoneOS14.5.sdk.tar.xz
          tar -xJf /tmp/iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks
          rm /tmp/iPhoneOS14.5.sdk.tar.xz

      # ── 6. Build ──────────────────────────────────────────────────────
      - name: Build package
        run: |
          make package FINALPACKAGE=1 ARCHS=arm64 2>&1

      # ── 7. Upload artifacts ───────────────────────────────────────────
      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: AovcheatLite-deb-${{ github.sha }}
          path: packages/*.deb
          if-no-files-found: warn

      # ── 8. Create GitHub Release on version tags ───────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
