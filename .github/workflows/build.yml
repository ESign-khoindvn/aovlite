name: Build IPA / DEB

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: 🔨 Theos Build
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. Setup Theos (toolchain + SDK + everything) ─────────────────
      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-sdks-url: "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz"

      # ── 3. Install extra system deps ──────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            fakeroot dpkg \
            libssl-dev libz-dev

      # ── 4. Build ──────────────────────────────────────────────────────
      - name: Build package
        run: |
          make package FINALPACKAGE=1 ARCHS=arm64 2>&1

      # ── 5. Upload DEB artifact ────────────────────────────────────────
      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: AovcheatLite-deb-${{ github.sha }}
          path: packages/*.deb
          if-no-files-found: warn

      # ── 6. Create GitHub Release on version tags ───────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
